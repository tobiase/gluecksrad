<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Glücksrad</title>
<style>
  :root {
    --bg: #0b1020;
    --bg2: #131c3a;
    --panel: rgba(255,255,255,0.04);
    --gold: #ffd54a;
    --gold2: #ffb300;
    --txt: #f4f6ff;
    --muted: #9fb0d8;
    --good: #34d399;
    --bad: #f87171;
    --tile: #1a2547;
    --tile-edge: #2c3c72;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(1200px 800px at 50% -10%, var(--bg2), var(--bg));
    color: var(--txt);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  #app { height: 100vh; display: flex; flex-direction: column; padding: 1.4vh 2vw; gap: 1.2vh; }

  /* Header */
  header { display: flex; align-items: baseline; justify-content: space-between; }
  h1 {
    margin: 0; font-size: clamp(28px, 4.2vw, 64px); letter-spacing: 2px;
    background: linear-gradient(180deg, var(--gold), var(--gold2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-weight: 800; text-shadow: 0 2px 12px rgba(255,179,0,0.15);
  }
  .category {
    font-size: clamp(16px, 1.8vw, 26px); color: var(--muted);
    text-transform: uppercase; letter-spacing: 3px; font-weight: 600;
  }
  .category b { color: var(--gold); }
  .audioCtrl { display: flex; gap: .6vw; align-self: center; }
  .audioCtrl button { padding: .7vh 1vw; font-size: clamp(12px,1.3vw,18px); box-shadow: 0 3px 0 #161f3c; }
  .audioCtrl button.off { opacity: .4; }
  .menuWrap { position: relative; }
  .menu { position: absolute; top: 120%; right: 0; display: none; flex-direction: column; gap: .5vh;
    background: var(--bg2); border: 2px solid var(--tile-edge); border-radius: 12px; padding: 1vh;
    z-index: 60; min-width: 180px; box-shadow: 0 10px 28px rgba(0,0,0,.55); }
  .menu.open { display: flex; }
  .menu button { width: 100%; text-align: left; font-size: clamp(13px,1.4vw,18px); }

  /* Layout */
  main { flex: 1; display: grid; grid-template-columns: 1.15fr 1fr; gap: 2vw; min-height: 0; }
  .left { display: flex; flex-direction: column; gap: 1.4vh; min-height: 0; }
  .right { display: flex; flex-direction: column; align-items: center; gap: 1.2vh; min-height: 0; }

  /* Puzzle board */
  #board { display: flex; flex-direction: column; gap: 1vh; align-items: center; justify-content: center; flex: 1; }
  .row { display: flex; gap: 0.6vw; justify-content: center; flex-wrap: wrap; }
  .tile {
    width: clamp(34px, 4.4vw, 78px); height: clamp(46px, 6vw, 104px);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(22px, 3.4vw, 60px); font-weight: 800;
    border-radius: 8px; background: var(--tile);
    border: 2px solid var(--tile-edge); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25);
  }
  .tile.empty { background: transparent; border-color: transparent; box-shadow: none; }
  .tile.hidden { background: #eef2ff; border-color: #cdd6f4; }
  .tile.revealed { background: #fff; color: #0b1020; animation: pop .25s ease; }
  @keyframes pop { from { transform: scale(.6); } to { transform: scale(1); } }
  .tile.zap { animation: zap .4s ease; }
  @keyframes zap { 0% { box-shadow: 0 0 0 rgba(255,213,74,0); } 45% { box-shadow: 0 0 20px 7px rgba(255,213,74,.9); } 100% { box-shadow: 0 0 0 rgba(255,213,74,0); } }
  .sparkle { position: fixed; z-index: 40; pointer-events: none; font-size: clamp(18px,2.2vw,32px);
    transition: transform .4s cubic-bezier(.3,.7,.3,1), opacity .4s ease; will-change: transform, opacity; }

  /* Players */
  .players { display: flex; gap: 1.4vw; justify-content: center; padding: .6vh 0 .8vh; padding-left: clamp(150px, 15vw, 240px); }
  .player {
    flex: 1; max-width: 240px; background: var(--panel); border: 2px solid transparent;
    border-radius: 14px; padding: 1vh 1vw; text-align: center; transition: .2s;
  }
  .player.active {
    border-color: var(--gold); background: rgba(255,213,74,0.10);
    box-shadow: 0 0 24px rgba(255,179,0,0.25);
  }
  .player .name { font-size: clamp(15px,1.6vw,22px); font-weight: 700; }
  .player .round { font-size: clamp(20px,2.6vw,38px); font-weight: 800; color: var(--gold); }
  .player .total { font-size: clamp(12px,1.2vw,16px); color: var(--muted); }

  /* Wheel */
  .wheelWrap { position: relative; width: clamp(220px, 26vw, 380px); aspect-ratio: 1; }
  canvas { width: 100%; height: 100%; display: block; filter: drop-shadow(0 8px 20px rgba(0,0,0,.45)); }
  .pointer {
    position: absolute; top: -2%; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent;
    border-top: 28px solid var(--gold); z-index: 5; filter: drop-shadow(0 2px 3px rgba(0,0,0,.5));
  }
  .hub {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 16%; height: 16%; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, var(--gold2));
    border: 3px solid #7a5200; z-index: 4;
  }

  /* Status + controls */
  .status {
    min-height: 3.2vh; text-align: center; font-size: clamp(16px,2vw,30px);
    font-weight: 700; padding: .6vh 1vw; border-radius: 10px;
  }
  .status.info { color: var(--gold); }
  .status.good { color: var(--good); }
  .status.bad  { color: var(--bad); }

  .controls { display: flex; flex-direction: column; gap: 1vh; align-items: center; width: 100%; }
  .btnRow { display: flex; gap: .8vw; flex-wrap: wrap; justify-content: center; }
  .tipBtn { display: none; background: linear-gradient(180deg,#5ad17a,#2fa955); color: #06240f; box-shadow: 0 4px 0 #1d6b36; }
  .tipBtn.show { display: inline-block; animation: tipPulse 1.6s ease-in-out infinite; }
  @keyframes tipPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  button {
    font-family: inherit; font-weight: 800; cursor: pointer; color: #0b1020;
    border: none; border-radius: 12px; padding: 1.1vh 1.6vw;
    font-size: clamp(14px,1.7vw,24px); transition: transform .08s, filter .15s;
    background: linear-gradient(180deg, var(--gold), var(--gold2));
    box-shadow: 0 4px 0 #8a5e00;
  }
  button:hover:not(:disabled) { filter: brightness(1.08); }
  button:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 1px 0 #8a5e00; }
  button.secondary { background: linear-gradient(180deg,#3a4a86,#27345f); color: #fff; box-shadow: 0 4px 0 #161f3c; }
  button:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; transform: none; }

  /* Letter keyboard */
  .keys { display: flex; flex-wrap: wrap; gap: .5vw; justify-content: center; max-width: 100%; }
  .key {
    width: clamp(30px,2.6vw,46px); height: clamp(30px,2.6vw,46px); padding: 0;
    font-size: clamp(14px,1.5vw,22px); border-radius: 8px; box-shadow: 0 3px 0 #8a5e00;
  }
  .key.vowel { background: linear-gradient(180deg,#7bdcff,#36a9e0); color:#06243a; box-shadow:0 3px 0 #0d4f73; }
  .key.used { opacity: .25; pointer-events: none; }
  .hint { color: var(--muted); font-size: clamp(12px,1.3vw,18px); }

  /* Overlay (solve + setup) */
  .overlay {
    position: fixed; inset: 0; background: rgba(5,8,20,.86); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .overlay.show { display: flex; }
  .card {
    background: var(--bg2); border: 2px solid var(--tile-edge); border-radius: 18px;
    padding: 4vh 4vw; text-align: center; max-width: 720px; width: 90%;
  }
  .card h2 { margin: 0 0 2vh; font-size: clamp(22px,3vw,40px); color: var(--gold); }
  .card input, .card textarea {
    width: 100%; font-size: clamp(18px,2.4vw,32px); font-family: inherit; font-weight: 700;
    text-align: center; text-transform: uppercase; padding: 1.4vh 1vw; border-radius: 12px;
    border: 2px solid var(--tile-edge); background: #0b1224; color: #fff; margin-bottom: 2vh;
  }
  .winner { font-size: clamp(28px,5vw,72px); font-weight: 900; color: var(--gold); margin: 2vh 0; }

  /* Start-Screen */
  .card.start { max-width: 660px; text-align: left; }
  .modeRow { display: flex; gap: 1vw; margin-bottom: 2.4vh; }
  .modeBtn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .3vh;
    background: linear-gradient(180deg,#3a4a86,#27345f); color: #fff; box-shadow: 0 4px 0 #161f3c; }
  .modeBtn small { font-weight: 600; opacity: .85; font-size: .62em; }
  .modeBtn.active { background: linear-gradient(180deg,var(--gold),var(--gold2)); color: #0b1020; box-shadow: 0 4px 0 #8a5e00; }
  .roundsRow { display: flex; align-items: center; gap: 1vw; margin-bottom: 2vh; color: var(--muted); font-weight: 700; font-size: clamp(14px,1.6vw,20px); }
  .roundsBtns { display: flex; gap: .6vw; }
  .roundsBtns button { padding: .6vh 1.3vw; background: linear-gradient(180deg,#3a4a86,#27345f); color: #fff; box-shadow: 0 3px 0 #161f3c; }
  .roundsBtns button.active { background: linear-gradient(180deg,var(--gold),var(--gold2)); color: #0b1020; box-shadow: 0 3px 0 #8a5e00; }
  .startPlayers { display: flex; flex-direction: column; gap: 1vh; margin-bottom: 1.4vh; }
  .prow { display: flex; align-items: center; gap: 1vw; }
  .prow input[type=text] { flex: 1; margin: 0; text-align: left; text-transform: none;
    padding: 1vh 1vw; font-size: clamp(15px,1.8vw,22px); }
  .prow .kid { display: flex; align-items: center; gap: .4vw; color: var(--muted);
    font-weight: 700; white-space: nowrap; cursor: pointer; font-size: clamp(13px,1.5vw,19px); }
  .prow .kid input { width: 22px; height: 22px; accent-color: var(--gold2); }
  .prow .rm { background: #5a2230; color: #fff; box-shadow: 0 3px 0 #2a0f16; padding: .7vh 1.1vw; }
  .addBtn { width: 100%; margin-bottom: .5vh; }
  .startHint { color: var(--muted); font-size: clamp(12px,1.3vw,16px); margin-top: 1vh; text-align: center; }

  /* Glücksfee */
  .hostess {
    position: fixed; left: 1vw; bottom: 0; width: clamp(120px, 13vw, 210px);
    z-index: 20; pointer-events: none; transform-origin: bottom center;
    animation: sway 3.5s ease-in-out infinite;
  }
  .hostess svg { width: 100%; height: auto; display: block; filter: drop-shadow(0 6px 14px rgba(0,0,0,.4)); }
  @keyframes sway { 0%,100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg); } }
  .armR { transform-origin: 144px 188px; animation: wave 1.6s ease-in-out infinite; }
  @keyframes wave { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-16deg); } }
  .eye { animation: blink 4s infinite; }
  @keyframes blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.1); } }
  .nametag {
    text-align: center; margin-top: .3vh; font-weight: 800; color: var(--gold);
    font-size: clamp(11px,1.1vw,16px); text-shadow: 0 1px 4px rgba(0,0,0,.6);
  }
  .bubble {
    position: absolute; bottom: 86%; left: 60%; min-width: 150px; max-width: 280px;
    background: #fff; color: #14203f; font-weight: 700; font-size: clamp(13px,1.3vw,20px);
    padding: 1vh 1.2vw; border-radius: 16px; line-height: 1.25; text-align: center;
    box-shadow: 0 6px 18px rgba(0,0,0,.4); transition: opacity .25s, transform .25s;
  }
  .bubble::after {
    content: ""; position: absolute; bottom: -14px; left: 22px;
    border: 10px solid transparent; border-top-color: #fff; border-bottom: 0;
  }
  .bubble.hide { opacity: 0; transform: translateY(8px); }
  /* Stimmungen */
  .hostess.cheer { animation: cheerBounce .6s ease infinite; }
  @keyframes cheerBounce { 0%,100% { transform: translateY(0) rotate(-1deg);} 50% { transform: translateY(-10px) rotate(2deg);} }
  .hostess.cheer .armR { animation: armUp .5s ease forwards; }
  @keyframes armUp { to { transform: rotate(-55deg); } }
  .hostess.sad .armR { animation: none; transform: rotate(6deg); }
  .hostess.sad #mouth { d: path("M96 146 Q110 134 124 146"); }
  .hostess.cheer #mouth { d: path("M92 136 Q110 158 128 136"); }

  /* ===== Mobil / Handy (gestapelt; ab <=600px, damit Desktop-Fenster im Original-Layout bleiben) ===== */
  @media (max-width: 600px) {
    html, body { height: auto; min-height: 100%; overflow-x: hidden; overflow-y: auto; }
    #app { height: auto; min-height: 100dvh; padding: 8px 12px; gap: 6px; }

    /* Reihenfolge: Titel -> Sound/Musik/⚙ -> Kategorie */
    header { flex-wrap: wrap; justify-content: center; gap: 4px 10px; }
    h1 { order: 0; width: 100%; text-align: center; font-size: 26px; }
    .audioCtrl { order: 1; gap: 6px; }
    .audioCtrl button { padding: 6px 10px; font-size: 12px; }
    .category { order: 2; width: 100%; text-align: center; font-size: 12px; letter-spacing: 1.5px; }

    main { display: flex; flex-direction: column; gap: 6px; }
    .left, .right { width: 100%; min-height: 0; }
    .right { gap: 6px; }

    #board { flex: none; gap: 4px; }
    .row { gap: 3px; }
    .tile { width: 26px; height: 34px; font-size: 17px; border-radius: 5px; border-width: 2px; box-shadow: inset 0 -3px 0 rgba(0,0,0,.25); }
    .tile.empty { width: 8px !important; }

    .wheelWrap { width: clamp(142px, 42vw, 172px); }
    .pointer { border-left-width: 12px; border-right-width: 12px; border-top-width: 22px; }
    .status { font-size: 16px; min-height: 0; padding: 2px 6px; }
    .btnRow { gap: 6px; }
    button { padding: 8px 10px; font-size: 13px; box-shadow: 0 3px 0 #8a5e00; white-space: nowrap; }
    button.secondary { box-shadow: 0 3px 0 #161f3c; }
    .key { width: 27px; height: 32px; font-size: 14px; border-radius: 6px; box-shadow: 0 2px 0 #8a5e00; }
    .keys { gap: 4px; max-width: 100%; }
    .hint { display: none; }
    .tipBtn.show { display: inline-block; }

    /* Glücksfee klein in die Ecke, Taps gehen durch (pointer-events:none) */
    .hostess { width: 54px; left: 4px; bottom: 2px; z-index: 8; }
    .nametag { display: none; }
    /* Sprechblase im freien Streifen ÜBER der Spielerleiste (Spieler enden bei ~84px) */
    .bubble { font-size: 11px; line-height: 1.2; min-width: 0; width: max-content; max-width: 76vw; left: 6px; bottom: 88px; padding: 6px 9px; }
    .bubble::after { display: none; }

    /* Spielerleiste kompakt, neben der Fee, horizontal scrollbar */
    .players { padding: 2px 0 2px 60px; gap: 6px; justify-content: flex-start; overflow-x: auto; }
    .player { flex: 0 0 auto; min-width: 84px; max-width: none; padding: 6px 8px; border-radius: 10px; }
    .player .name { font-size: 14px; }
    .player .round { font-size: 22px; }
    .player .total { font-size: 10px; }

    /* Overlays: scrollbar und volle Breite */
    .overlay { align-items: flex-start; overflow-y: auto; padding: 12px 0; }
    .card { width: 92%; max-width: 92%; padding: 18px 14px; margin: 8px auto; }
    .card.start { max-width: 92%; }
    .card h2 { font-size: 21px; }
    .modeRow { flex-direction: column; gap: 8px; }
    .modeBtn { width: 100%; }
    .roundsRow { font-size: 16px; }
    .prow { flex-wrap: wrap; gap: 8px; }
    .prow input[type=text] { flex: 1 1 100%; }
    .winner { font-size: 34px; }
    .menu { min-width: 160px; }
  }

  /* Querformat-Handy: etwas niedrigere Höhen */
  @media (max-width: 900px) and (orientation: landscape) and (max-height: 480px) {
    .wheelWrap { width: 40vw; max-width: 220px; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>★ GLÜCKSRAD ★</h1>
    <div class="audioCtrl">
      <button id="sfxBtn" class="secondary" title="Geräusche an/aus">🔊 Sound</button>
      <button id="musicBtn" class="secondary" title="Musik an/aus">🎵 Musik</button>
      <div class="menuWrap">
        <button id="menuBtn" class="secondary" title="Einstellungen">⚙</button>
        <div class="menu" id="menu">
          <button id="endNowBtn" class="secondary">🏁 Jetzt beenden</button>
          <button id="newGameBtn" class="secondary">🔄 Neues Spiel</button>
          <button id="resetBtn" class="secondary">♻️ Reset</button>
        </div>
      </div>
    </div>
    <div class="category">Kategorie: <b id="cat">—</b></div>
  </header>

  <main>
    <div class="left">
      <div id="board"></div>
    </div>

    <div class="right">
      <div class="wheelWrap">
        <div class="pointer"></div>
        <div class="hub"></div>
        <canvas id="wheel" width="600" height="600"></canvas>
      </div>
      <div class="status info" id="status">Drücke <b>Drehen</b> zum Start!</div>
      <div class="controls">
        <div class="btnRow">
          <button id="spinBtn">🎡 Drehen</button>
          <button id="vowelBtn" class="secondary">🔤 Vokal kaufen (250)</button>
          <button id="solveBtn" class="secondary">💡 Lösen</button>
          <button id="tipBtn" class="tipBtn">🧒 Tipp</button>
        </div>
        <div class="keys" id="keys"></div>
        <div class="hint" id="hint"></div>
      </div>
    </div>
  </main>

  <div class="players" id="players"></div>
</div>

<!-- Glücksfee / Moderatorin -->
<div class="hostess" id="hostess">
  <div class="bubble" id="bubble">Hallo! Ich bin Fee Lina – los geht's! 🎉</div>
  <svg viewBox="0 0 220 360" id="feeSvg" aria-label="Glücksfee">
    <!-- Schatten -->
    <ellipse cx="110" cy="350" rx="60" ry="9" fill="rgba(0,0,0,0.35)"/>
    <!-- Kleid -->
    <path d="M70 175 Q110 165 150 175 L185 330 Q110 350 35 330 Z" fill="#e23b8a"/>
    <path d="M70 175 Q110 165 150 175 L160 235 Q110 248 60 235 Z" fill="#ff5fa8"/>
    <!-- Sterne auf dem Kleid -->
    <text x="92" y="290" font-size="22" fill="#ffd54a">★</text>
    <text x="118" y="315" font-size="16" fill="#ffd54a">★</text>
    <!-- Linker Arm -->
    <g class="armL"><path d="M76 188 q-34 22 -40 58" stroke="#ffd9b3" stroke-width="15" fill="none" stroke-linecap="round"/><circle cx="36" cy="246" r="10" fill="#ffd9b3"/></g>
    <!-- Rechter Arm (winkt/präsentiert) -->
    <g class="armR"><path d="M144 188 q42 -6 60 -34" stroke="#ffd9b3" stroke-width="15" fill="none" stroke-linecap="round"/><circle cx="204" cy="154" r="11" fill="#ffd9b3"/></g>
    <!-- Haare hinten (Seitenlocken, liegen HINTER dem Hals) -->
    <path d="M62 120 Q70 58 110 56 Q150 58 158 120 L154 190 Q150 152 110 152 Q70 152 66 190 Z" fill="#7a4a2b"/>
    <!-- Hals (liegt VOR den Haaren, echte Hautfarbe) -->
    <path d="M100 150 h20 v22 q-10 7 -20 0 Z" fill="#ffd2a8"/>
    <path d="M100 150 h20 v6 q-10 5 -20 0 Z" fill="#e6b189"/>
    <!-- Kopf -->
    <circle cx="110" cy="120" r="46" fill="#ffe0c2"/>
    <!-- Haare vorne (Pony, nur oben) -->
    <path d="M64 120 Q70 64 110 62 Q150 64 156 120 Q150 96 110 92 Q70 96 64 120 Z" fill="#8a5430"/>
    <!-- Gesicht -->
    <circle class="eye" cx="94" cy="118" r="5" fill="#3a2a1a"/>
    <circle class="eye" cx="126" cy="118" r="5" fill="#3a2a1a"/>
    <circle cx="84" cy="132" r="6" fill="#ff9bbf" opacity="0.6"/>
    <circle cx="136" cy="132" r="6" fill="#ff9bbf" opacity="0.6"/>
    <path id="mouth" d="M96 138 Q110 152 124 138" stroke="#b5413f" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Krönchen -->
    <path d="M86 70 L96 52 L110 66 L124 52 L134 70 Z" fill="#ffd54a" stroke="#b5870a" stroke-width="2"/>
    <circle cx="110" cy="50" r="4" fill="#fff"/>
    <!-- Zauberstab in der rechten Hand -->
    <g class="wand"><line x1="204" y1="154" x2="226" y2="120" stroke="#ffd54a" stroke-width="4"/><text x="220" y="120" font-size="26" fill="#ffd54a">✨</text></g>
  </svg>
  <div class="nametag">✨ Fee Lina ✨</div>
</div>

<!-- Solve overlay -->
<div class="overlay" id="solveOverlay">
  <div class="card">
    <h2>Lösungswort eingeben</h2>
    <input id="solveInput" autocomplete="off" placeholder="Ganze Lösung tippen…" />
    <div class="btnRow" style="justify-content:center">
      <button id="solveConfirm">Lösen</button>
      <button id="solveCancel" class="secondary">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Round/Game end overlay -->
<div class="overlay" id="endOverlay">
  <div class="card">
    <h2 id="endTitle">Runde gelöst!</h2>
    <div id="endBody"></div>
    <div class="btnRow" style="justify-content:center">
      <button id="nextBtn">Weiter ▶</button>
    </div>
  </div>
</div>

<!-- Start-Screen: Spieler & Modus -->
<div class="overlay" id="startOverlay">
  <div class="card start">
    <h2>🎡 Neues Spiel</h2>
    <div class="modeRow">
      <button id="modeKids" class="modeBtn">👶 Mit Kind<small>leichte Wörter + Hilfe für Kinder</small></button>
      <button id="modeAdults" class="modeBtn">🧠 Ohne Kind<small>schwere Wörter</small></button>
    </div>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const VOWELS = ["A","E","I","O","U","Ä","Ö","Ü"];
const isVowel = c => VOWELS.includes(c);
const isLetter = c => /[A-ZÄÖÜ]/.test(c);

//// ----- State -----
let state;
function newGame() {
  clearTimeout(cpuTimer);
  kidMode = config.kidMode;
  const pool = kidMode ? POOLS.easy : POOLS.hard;
  const rounds = Math.min(config.rounds || ROUNDS, pool.length);
  const deck = shuffle(pool).slice(0, rounds);
  state = {
    players: config.players.map(p => ({ name: p.name, isChild: p.isChild, isCpu: p.isCpu, round: 0, total: 0 })),
    cur: 0,
    deck, puzzleIdx: 0,
    revealed: new Set(),
    guessed: new Set(),
    spinValue: null,    // pending consonant value after a spin
    spinning: false,
    rotation: 0,
    helpUsed: false,    // Kinder-Tipp pro Zug
  };
  loadPuzzle();
  render();
  const names = state.players.map(p => p.name);
  hostessSay(`Willkommen ${names.join(", ")}! ${names[0]} beginnt – dreh das Rad! 🎡`);
  scheduleCpu(1400);
}
function curPuzzle() { return state.deck[state.puzzleIdx]; }
function loadPuzzle() {
  state.revealed = new Set();
  state.guessed = new Set();
  state.spinValue = null;
  state.players.forEach(p => p.round = 0);
  state.cur = 0;
  state.helpUsed = false;
}

//// ----- Rendering -----
const el = id => document.getElementById(id);

function render() {
  const pz = curPuzzle();
  el("cat").textContent = pz.cat;

  renderPlayers();
  renderKeys();
  updateControls();
  persist();

function renderBoard() {
  const words = curPuzzle().text.split(" ");
  const board = el("board");
  board.innerHTML = "";
  // group words into rows so they fit; simple: one row, wrap handled by flex
  const row = document.createElement("div"); row.className = "row";
  words.forEach((w, wi) => {
    const wordEl = document.createElement("div"); wordEl.className = "row"; wordEl.style.gap = "0.6vw";
    [...w].forEach(ch => {
      const t = document.createElement("div");
      if (!isLetter(ch)) { t.className = "tile revealed"; t.textContent = ch; }
      else if (state.revealed.has(ch)) { t.className = "tile revealed"; t.textContent = ch; }
      else { t.className = "tile hidden"; t.textContent = ""; }
      wordEl.appendChild(t);
    });
    row.appendChild(wordEl);
    if (wi < words.length - 1) {
      const sp = document.createElement("div"); sp.className = "tile empty"; sp.style.width = "1.4vw";
      row.appendChild(sp);
    }
  });
  board.appendChild(row);
}

function renderPlayers() {
  const c = el("players"); c.innerHTML = "";
  state.players.forEach((p, i) => {
    const d = document.createElement("div");
    d.className = "player" + (i === state.cur ? " active" : "");
    const badge = p.isCpu ? " 🤖" : (p.isChild ? " 👶" : "");
    d.innerHTML = `<div class="name">${p.name}${badge}</div>
      <div class="round">${p.round}</div>
      <div class="total">Gesamt: ${p.total}</div>`;
    c.appendChild(d);
  });
}

function renderKeys() {
  const k = el("keys"); k.innerHTML = "";
  const cons = [..."BCDFGHJKLMNPQRSTVWXYZ"];
  // consonants only shown for spinning-guess; vowels via buy button. Show all as a reference grid.
  cons.forEach(ch => k.appendChild(makeKey(ch, false)));
}
function makeKey(ch, vowel) {
  const b = document.createElement("button");
  b.className = "key" + (vowel ? " vowel" : "") + (state.guessed.has(ch) ? " used" : "");
  b.textContent = ch;
  b.dataset.letter = ch;
  b.disabled = state.guessed.has(ch);
  b.onclick = () => guessConsonant(ch);
  // keys only active when a spin value is pending
  if (!vowel && state.spinValue == null) { b.disabled = true; b.style.opacity = state.guessed.has(ch) ? "" : ".4"; }
  return b;
}

let bubbleTimer = null;
function hostessSay(text, mood = "") {
  const b = el("bubble"), h = el("hostess");

    b.classList.add("hide");

  }, mood === "cheer" ? 3500 : 4500);
}
const pick = arr => arr[Math.floor(Math.random() * arr.length)];

//// ----- Audio (Web Audio API, keine Dateien nötig) -----
const Audio = (() => {
  let ctx = null, sfxOn = true, musicOn = false, musicTimer = null, musicGain = null;
  const ensure = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (!musicGain) { musicGain = ctx.createGain(); musicGain.gain.value = 1; musicGain.connect(ctx.destination); }
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  };
  // Ducking: Musik kurz absenken, wenn ein Geräusch spielt
  function duckMusic() {
    if (!musicOn || !musicGain) return;
    const t = ctx.currentTime;
    musicGain.gain.cancelScheduledValues(t);
    musicGain.gain.setValueAtTime(0.25, t);
    musicGain.gain.linearRampToValueAtTime(1, t + 0.5);
  }
  // einzelner Ton mit weicher Hüllkurve; dest=musicGain für Musik, sonst SFX (-> duckt)
  function tone(freq, dur, { type = "sine", gain = 0.18, when = 0, slideTo = null, dest = null } = {}) {
    if (!ctx) return;
    const out = dest || ctx.destination;
    if (out === ctx.destination) duckMusic();   // ein SFX -> Musik ducken
    const t = ctx.currentTime + when;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(out);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function seq(notes, { type = "triangle", gain = 0.2, step = 0.12 } = {}) {
    notes.forEach((f, i) => tone(f, step * 0.95, { type, gain, when: i * step }));
  }
  // Tonleiter-Frequenzen
  const N = { C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,C5:523.3,D5:587.3,E5:659.3,G5:784,A5:880,C6:1046.5 };
  // Applaus über gefiltertes Rauschen (klingt nach klatschendem Publikum)
  function applauseBurst(dur = 1.8, gain = 0.28) {
    if (!ctx) return;
    duckMusic();
    const t = ctx.currentTime, len = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (0.5 + 0.5 * Math.random()); // körniges Klatschen
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 1900; bp.Q.value = 0.7;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t + 0.12);
    g.gain.linearRampToValueAtTime(gain * 0.75, t + dur * 0.45);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(bp).connect(g).connect(ctx.destination);
    src.start(t); src.stop(t + dur);
  }

  const sfx = {
    tick()      { if (sfxOn && ctx) tone(1200, 0.03, { type: "square", gain: 0.08 }); },
    spinStart() { if (sfxOn) { ensure(); tone(180, 0.4, { type: "sawtooth", gain: 0.12, slideTo: 520 }); } },
    correct()   { if (sfxOn) { ensure(); seq([N.C5, N.E5, N.G5, N.C6], { gain: 0.22, step: 0.1 }); } },
    vowel()     { if (sfxOn) { ensure(); seq([N.G5, N.C6, N.E5], { type: "sine", gain: 0.2, step: 0.08 }); } },
    wrong()     { if (sfxOn) { ensure(); tone(300, 0.45, { type: "sawtooth", gain: 0.2, slideTo: 90 }); } },
    bankrupt()  { if (sfxOn) { ensure(); seq([N.E4, N.D4, N.C4], { type: "sawtooth", gain: 0.22, step: 0.18 }); tone(110,0.6,{type:"sawtooth",gain:0.15,when:0.5,slideTo:70}); } },
    win()       { if (sfxOn) { ensure(); seq([N.C5,N.E5,N.G5,N.C6,N.G5,N.C6], { gain: 0.24, step: 0.13 }); } },
    applause()  { if (sfxOn) { ensure(); applauseBurst(1.8, 0.28); } },
    fanfare()   { if (sfxOn) { ensure();
      seq([N.G4, N.C5, N.E5, N.G5], { type: "sawtooth", gain: 0.16, step: 0.13 });   // Ta-ta-ta-taa
      [N.C5, N.E5, N.G5].forEach(f => tone(f, 0.8, { type: "sawtooth", gain: 0.12, when: 0.52 })); // Schluss-Akkord
    } },
  };

  // sanfte Hintergrundmusik – fröhliche Schleife (Pentatonik)
  const MELODY = [N.C5,N.E5,N.G5,N.A5,N.G5,N.E5,N.D5,N.E5, N.C5,N.D5,N.E5,N.G5,N.E5,N.D5,N.C5,N.D5];
  let mi = 0;
  function musicStep() {
    if (!musicOn) return;
    const f = MELODY[mi % MELODY.length];
    tone(f, 0.42, { type: "triangle", gain: 0.05, dest: musicGain });
    tone(f / 2, 0.42, { type: "sine", gain: 0.035, dest: musicGain });   // sanfter Bass
    mi++;
    musicTimer = setTimeout(musicStep, 360);
  }

  return {
    sfx,
    unlock() { ensure(); },
    toggleSfx() { sfxOn = !sfxOn; if (sfxOn) { ensure(); sfx.vowel(); } return sfxOn; },
    toggleMusic() {
      musicOn = !musicOn;
      if (musicOn) { ensure(); musicStep(); } else { clearTimeout(musicTimer); }
      return musicOn;
    },
  };
})();

function updateControls() {
  const cpu = isCpuTurn();
  el("spinBtn").disabled = cpu || state.spinning || state.spinValue != null;
  el("vowelBtn").disabled = cpu || state.spinning || state.spinValue != null || !canBuyVowel();
  el("solveBtn").disabled = cpu || state.spinning;
  el("keys").style.pointerEvents = cpu ? "none" : "auto";
  const showTip = isChildTurn() && !state.helpUsed && !state.spinning;
  el("tipBtn").classList.toggle("show", showTip);
  el("hint").textContent = state.spinValue != null
    ? `Du hast ${state.spinValue} gedreht — wähle einen Konsonanten!`
    : "Drehen → Konsonant raten · oder Vokal kaufen · oder Lösen";
}
function isChildTurn() {
  return kidMode && state.players[state.cur] && state.players[state.cur].isChild;
}
function childHint() {
  const pz = curPuzzle(), name = state.players[state.cur].name;
  return pick([
    `Tipp: Das Wort gehört zu „${pz.cat}". Du schaffst das! 💪`,
    `Schau genau hin – Thema ist „${pz.cat}". 🔎`,
    `${name}, wenn du Hilfe brauchst: drück auf 🧒 Tipp!`,
  ]);
}
function giveTip() {
  if (!isChildTurn() || state.helpUsed || state.spinning) return;
  const text = curPuzzle().text;
  const hidden = [...new Set([...text].filter(c => isLetter(c) && !state.revealed.has(c)))];
  if (!hidden.length) return;
  const L = pick(hidden);
  state.revealed.add(L);
  state.guessed.add(L);     // auf der Tastatur als benutzt markieren
  fxSparkleToLetter(L);
  state.helpUsed = true;
  setStatus(`🎁 Geschenkt: ein „${L}"! Mach weiter.`, "good");
  hostessSay(`Hier, ein „${L}" für dich! ✨`, "cheer");
  Audio.sfx.vowel();
  if (allRevealed()) return solvedByReveal();
  render();
}
function canBuyVowel() {
  if (state.players[state.cur].round < 250) return false;
  return VOWELS.some(v => !state.guessed.has(v) && curPuzzle().text.includes(v));
  // (allow buying any unguessed vowel really; this just enables when sensible)
}

//// ----- Wheel drawing -----
const canvas = el("wheel"), ctx = canvas.getContext("2d");
const N = SEGMENTS.length, SEG = (Math.PI * 2) / N, R = 300;
function drawWheel(rot) {
  ctx.clearRect(0,0,600,600);
  ctx.save();
  ctx.translate(300,300);
  ctx.rotate(rot - Math.PI/2); // 0 at top
  for (let i = 0; i < N; i++) {
    const a0 = i * SEG, a1 = a0 + SEG;
    const seg = SEGMENTS[i];
    let color;
    if (seg === "BANKROTT") color = "#111";
    else if (seg === "AUSSETZEN") color = "#444";
    else color = SEG_COLORS[i % SEG_COLORS.length];
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,a0,a1); ctx.closePath();
    ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,.35)"; ctx.lineWidth = 2; ctx.stroke();
    // label
    ctx.save();
    ctx.rotate(a0 + SEG/2);
    ctx.textAlign = "right"; ctx.textBaseline = "middle";
    ctx.fillStyle = (seg === "BANKROTT" || seg === "AUSSETZEN") ? "#ffd54a" : "#fff";
    ctx.font = `800 ${seg === "BANKROTT" || seg === "AUSSETZEN" ? 22 : 30}px Segoe UI, sans-serif`;
    const label = seg === "BANKROTT" ? "PLEITE" : seg === "AUSSETZEN" ? "AUS" : String(seg);
    ctx.fillText(label, R - 18, 0);
    ctx.restore();
  }
  ctx.restore();
}
function segmentAtPointer(rot) {
  // pointer at top; find segment index whose center we landed on
  let a = (-rot) % (Math.PI*2); if (a < 0) a += Math.PI*2;
  return Math.floor(a / SEG) % N;
}

//// ----- Spin -----
function spin() {
  if (state.spinning || state.spinValue != null) return;
  state.spinning = true; updateControls();
  const target = Math.floor(Math.random() * N);
  const targetRot = -(target + 0.5) * SEG;           // lands center of target at pointer
  const turns = 4 + Math.floor(Math.random() * 3);
  const start = state.rotation;
  // compute final rotation >= start with proper modulo alignment
  let end = targetRot;
  while (end < start + turns * Math.PI * 2) end += Math.PI * 2;
  const dur = 4200, t0 = performance.now();
  setStatus("Das Rad dreht sich…", "info");
  hostessSay(pick(["Und es dreht sich… 🎡", "Drück die Daumen!", "Mal sehen, wo's stehen bleibt!"]));
  Audio.sfx.spinStart();
  let lastSeg = segmentAtPointer(state.rotation);
  function frame(now) {
    const p = Math.min((now - t0) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    state.rotation = start + (end - start) * ease;
    drawWheel(state.rotation);
    const s = segmentAtPointer(state.rotation);
    if (s !== lastSeg) { lastSeg = s; Audio.sfx.tick(); }   // Ticken pro Segment, wird langsamer
    if (p < 1) requestAnimationFrame(frame);
    else finishSpin();
  }
  requestAnimationFrame(frame);
}
function finishSpin() {
  state.spinning = false;
  const idx = segmentAtPointer(state.rotation);
  const seg = SEGMENTS[idx];
  if (seg === "BANKROTT") {
    state.players[state.cur].round = 0;
    setStatus("💥 PLEITE! Runden-Punkte weg.", "bad");
    hostessSay("Oh nein, Pleite! Das ist Pech. 😟", "sad");
    Audio.sfx.bankrupt();
    setTimeout(nextPlayer, 1400);
  } else if (seg === "AUSSETZEN") {
    setStatus("⏭️ Aussetzen — nächster ist dran.", "bad");
    hostessSay("Schade, einmal aussetzen!", "sad");
    Audio.sfx.wrong();
    setTimeout(nextPlayer, 1400);
  } else {
    state.spinValue = seg;
    setStatus(`Du hast <b>${seg}</b> gedreht — rate einen Konsonanten!`, "info");
    hostessSay(`${seg} Punkte! Welcher Buchstabe? 🔤`);
    scheduleCpu(900);
  }
  render();
}

//// ----- Guessing -----
function guessConsonant(ch) {
  if (state.spinValue == null || state.guessed.has(ch) || isVowel(ch)) return;
  state.guessed.add(ch);
  const text = curPuzzle().text;
  const count = [...text].filter(c => c === ch).length;
  if (count > 0) {
    state.revealed.add(ch);
    fxSparkleToLetter(ch);
    const gain = state.spinValue * count;
    state.players[state.cur].round += gain;
    state.spinValue = null;
    setStatus(`✅ ${count}× „${ch}" — +${gain} Punkte! Weiter drehen oder lösen.`, "good");
    hostessSay(pick([`Super! ${count}× das ${ch}! 🎉`, "Klasse geraten!", "Toll gemacht! ⭐"]), "cheer");
    Audio.sfx.correct();
    if (allRevealed()) return solvedByReveal();
    scheduleCpu(1100);   // CPU macht weiter
  } else {
    state.spinValue = null;
    setStatus(`❌ Kein „${ch}". Nächster Spieler!`, "bad");
    hostessSay(pick([`Kein ${ch}, leider. Nächster!`, "Knapp daneben!"]), "sad");
    Audio.sfx.wrong();
    setTimeout(nextPlayer, 1300);
  }
  render();
}

function buyVowel() {
  if (state.spinValue != null || state.spinning) return;
  const p = state.players[state.cur];
  if (p.round < 250) { setStatus("Nicht genug Punkte für einen Vokal (250 nötig).", "bad"); return; }
  // pick available vowel via prompt-free overlay: use a temporary key row
  showVowelPicker();
}
function showVowelPicker() {
  const k = el("keys"); k.innerHTML = "";
  VOWELS.forEach(v => {
    const b = makeKey(v, true);
    b.disabled = state.guessed.has(v);
    b.onclick = () => resolveVowel(v);
    k.appendChild(b);
  });
  setStatus("Wähle einen Vokal (kostet 250).", "info");
  el("spinBtn").disabled = true; el("vowelBtn").disabled = true;
}
function resolveVowel(v) {
  if (state.guessed.has(v)) return;
  const p = state.players[state.cur];
  p.round -= 250;
  state.guessed.add(v);
  const text = curPuzzle().text;
  const count = [...text].filter(c => c === v).length;
  if (count > 0) {
    state.revealed.add(v);
    fxSparkleToLetter(v);
    setStatus(`✅ ${count}× „${v}" aufgedeckt! Weiter drehen oder lösen.`, "good");
    hostessSay(`Da ist ein ${v}! ✨`, "cheer");
    Audio.sfx.vowel();
    if (allRevealed()) return solvedByReveal();
    scheduleCpu(1100);
  } else {
    setStatus(`❌ Kein „${v}". Du bleibst dran — weiter drehen oder lösen.`, "bad");
    hostessSay(`Kein ${v} dabei – versuch's weiter!`);
    Audio.sfx.wrong();
    scheduleCpu(1100);
  }
  render();
}

// Magie-Funke fliegt vom Zauberstab der Fee zum frisch aufgedeckten Buchstaben (schnell, dekorativ)
function fxSparkleToLetter(ch) {
  setTimeout(() => {   // nach dem render() dieses Ticks; feuert auch im Hintergrund-Tab
    const fee = el("hostess").getBoundingClientRect();
    const tiles = [...document.querySelectorAll("#board .tile.revealed")].filter(t => t.textContent === ch);
    if (!tiles.length) return;
    const sx = fee.left + fee.width * 0.92, sy = fee.top + fee.height * 0.12; // ~Zauberstabspitze
    tiles.slice(0, 6).forEach((tile, i) => {
      const r = tile.getBoundingClientRect();
      const s = document.createElement("div");
      s.className = "sparkle"; s.textContent = "✨";
      s.style.left = sx + "px"; s.style.top = sy + "px";
      document.body.appendChild(s);
      setTimeout(() => {   // kurze Pause für den Reflow, dann fliegen
        s.style.transitionDelay = (i * 0.04) + "s";
        s.style.transform = `translate(${r.left + r.width / 2 - sx}px, ${r.top + r.height / 2 - sy}px) scale(1.5)`;
        s.style.opacity = "0";
      }, 20);
      setTimeout(() => s.remove(), 720 + i * 40);
      setTimeout(() => tile.classList.add("zap"), 360 + i * 40);
      setTimeout(() => tile.classList.remove("zap"), 800 + i * 40);
    });
  }, 0);
}

function allRevealed() {
  return [...curPuzzle().text].every(c => !isLetter(c) || state.revealed.has(c));
}
function solvedByReveal() {
  setStatus("🎉 Komplett aufgedeckt!", "good");
  render();
  setTimeout(() => roundWon(state.cur), 800);
}

//// ----- Solve overlay -----
function openSolve() {
  el("solveInput").value = "";
  el("solveOverlay").classList.add("show");
  setTimeout(() => el("solveInput").focus(), 50);
}
function closeSolve() { el("solveOverlay").classList.remove("show"); }
function confirmSolve() {
  const guess = el("solveInput").value.trim().toUpperCase().replace(/\s+/g, " ");
  const answer = curPuzzle().text.toUpperCase();
  closeSolve();
  if (guess === answer) {
    // reveal everything
    [...answer].forEach(c => { if (isLetter(c)) state.revealed.add(c); });
    render();
    roundWon(state.cur);
  } else {
    setStatus("❌ Falsch geraten! Nächster Spieler.", "bad");
    hostessSay("Das war's leider nicht ganz!", "sad");
    Audio.sfx.wrong();
    setTimeout(nextPlayer, 1300);
  }
}

//// ----- Turn / round flow -----
function nextPlayer() {
  state.spinValue = null;
  state.helpUsed = false;
  state.cur = (state.cur + 1) % state.players.length;
  const name = state.players[state.cur].name;
  setStatus(`<b>${name}</b> ist dran${isCpuTurn() ? " 🤖…" : " — Drehen!"}`, "info");
  hostessSay(isCpuTurn() ? `🤖 ${name} ist am Zug!` : (isChildTurn() ? childHint() : `${name}, du bist dran! 🎡`));
  renderKeys(); render();
  scheduleCpu();
}

//// ----- Computer-Gegner -----
let cpuTimer = null;
function isCpuTurn() { return !!(state && state.players[state.cur] && state.players[state.cur].isCpu); }
function scheduleCpu(delay = 1100) {
  clearTimeout(cpuTimer);
  if (isCpuTurn()) cpuTimer = setTimeout(cpuStep, delay);
}
const CONS_FREQ = ["N","R","S","T","L","D","H","G","M","B","W","F","K","Z","P","V","C","J","Q","X","Y"];
const VOWEL_FREQ = ["E","A","I","O","U","Ä","Ö","Ü"];
function cpuStep() {
  if (!isCpuTurn() || state.spinning) return;
  if (el("endOverlay").classList.contains("show") || el("startOverlay").classList.contains("show")) return;
  if (state.spinValue != null) { cpuGuessConsonant(); return; }   // Konsonant raten
  if (cpuShouldSolve()) { cpuSolve(); return; }
  if (cpuShouldBuyVowel()) { cpuBuyVowel(); return; }
  spin();   // finishSpin plant den nächsten Schritt
}
function revealFraction() {
  const letters = [...curPuzzle().text].filter(isLetter);
  const shown = letters.filter(c => state.revealed.has(c)).length;
  return letters.length ? shown / letters.length : 1;
}
function cpuShouldSolve() {
  const hidden = [...new Set([...curPuzzle().text].filter(c => isLetter(c) && !state.revealed.has(c)))];
  if (hidden.length === 0) return true;
  if (hidden.length <= 2) return Math.random() < 0.9;
  if (revealFraction() >= 0.6) return Math.random() < 0.5;
  return false;
}
function cpuShouldBuyVowel() {
  if (state.players[state.cur].round < 300) return false;
  const hiddenVowels = VOWELS.some(v => !state.guessed.has(v) && curPuzzle().text.includes(v));
  return hiddenVowels && Math.random() < 0.3;
}
function cpuGuessConsonant() {
  const avail = CONS_FREQ.filter(c => !state.guessed.has(c));
  if (!avail.length) { nextPlayer(); return; }
  const ch = Math.random() < 0.75 ? pick(avail.slice(0, 6)) : pick(avail);   // meist häufig, manchmal daneben
  setStatus(`🤖 ${state.players[state.cur].name} rät „${ch}" …`, "info");
  guessConsonant(ch);
}
function cpuBuyVowel() {
  const v = VOWEL_FREQ.find(x => !state.guessed.has(x));
  if (!v) { spin(); return; }
  setStatus(`🤖 ${state.players[state.cur].name} kauft Vokal „${v}" …`, "info");
  resolveVowel(v);
}
function cpuSolve() {
  const answer = curPuzzle().text;
  [...answer].forEach(c => { if (isLetter(c)) state.revealed.add(c); });
  setStatus(`🤖 ${state.players[state.cur].name} löst: ${answer}`, "good");
  hostessSay("Der Computer hat's gelöst! 🤖", "cheer");
  render();
  roundWon(state.cur);
}

function roundWon(playerIdx) {
  const p = state.players[playerIdx];
  p.total += p.round;
  hostessSay(`Bravo ${p.name}! Geschafft! 🎉🏆`, "cheer");
  const isLast = state.puzzleIdx >= state.deck.length - 1; // letzte Runde des Spiels
  if (isLast) { showGameOver(); return; }
  Audio.sfx.win(); Audio.sfx.applause();   // Runde gelöst: Jubel + Applaus
  state.pending = "round";   // für Reload zwischen den Runden
  persist();
  showRoundResult();
}
function showGameOver(title) {
  Audio.sfx.fanfare(); Audio.sfx.applause();   // grosses Finale: Tusch + Applaus
  const ranked = [...state.players].sort((a, b) => b.total - a.total);
  const top = ranked[0].total;
  const winners = ranked.filter(r => r.total === top).map(r => r.name);
  const winLine = winners.length > 1 ? `${winners.join(" & ")} gewinnen!` : `${winners[0]} gewinnt!`;
  el("endTitle").textContent = title || "🏆 Spiel vorbei!";
  el("endBody").innerHTML =
    `<div class="winner">${top > 0 ? winLine : "Unentschieden!"}</div>` +
    ranked.map((r, i) => `<div style="font-size:clamp(16px,2vw,26px)">${["🥇","🥈","🥉"][i] || "▫️"} ${r.name}: <b style="color:var(--gold)">${r.total}</b></div>`).join("");
  el("nextBtn").textContent = "Neues Spiel ▶";
  el("nextBtn").onclick = () => { el("endOverlay").classList.remove("show"); showStartScreen(); };
  clearSave();   // Spiel ist vorbei – nicht wiederherstellen
  el("endOverlay").classList.add("show");
}
function endGameNow() {
  if (!state) return;
  toggleMenu(false);
  hostessSay("Das war's für heute – tolles Spiel! 🏆", "cheer");
  showGameOver("🏁 Spiel beendet!");
}
function showRoundResult() {
  const p = state.players[state.cur];
  el("endTitle").textContent = "Runde gelöst!";
  el("endBody").innerHTML =
    `<div style="font-size:clamp(18px,2.4vw,30px)">${p.name} holt sich <b style="color:var(--gold)">${p.round}</b> Punkte!</div>` +
    `<div style="margin-top:1.5vh;color:var(--muted)">Lösung: <b>${curPuzzle().text}</b></div>`;
  el("nextBtn").textContent = "Nächste Runde ▶";
  el("nextBtn").onclick = () => {
    el("endOverlay").classList.remove("show");
    state.pending = null;
    state.puzzleIdx++;
    loadPuzzle(); render();
    setStatus(`Neue Runde! <b>${state.players[0].name}</b> beginnt.`, "info");
    scheduleCpu(1200);
  };
  el("endOverlay").classList.add("show");
}

//// ----- Start-Screen -----
function showStartScreen() {
  renderModeBtns();
  renderRounds();
  renderStartPlayers();
  el("startOverlay").classList.add("show");
}
function renderModeBtns() {
  el("modeKids").classList.toggle("active", config.kidMode);
  el("modeAdults").classList.toggle("active", !config.kidMode);
}
function renderRounds() {
  const c = el("roundsBtns"); c.innerHTML = "";
  [3, 5, 7, 10].forEach(n => {
    const b = document.createElement("button");
    b.textContent = n; b.classList.toggle("active", config.rounds === n);
    b.onclick = () => { config.rounds = n; renderRounds(); };
    c.appendChild(b);
  });
}
function renderStartPlayers() {
  const c = el("startPlayers"); c.innerHTML = "";
  config.players.forEach((p, i) => {
    const row = document.createElement("div"); row.className = "prow";
    const input = document.createElement("input");
    input.type = "text"; input.maxLength = 14; input.placeholder = "Name"; input.value = p.name;
    input.oninput = () => { config.players[i].name = input.value; };
    const lab = document.createElement("label"); lab.className = "kid";
    const cb = document.createElement("input"); cb.type = "checkbox"; cb.checked = p.isChild;
    cb.onchange = () => { config.players[i].isChild = cb.checked; if (cb.checked) { config.players[i].isCpu = false; renderStartPlayers(); } };
    lab.appendChild(cb); lab.append(" 👶 Kind");
    const labC = document.createElement("label"); labC.className = "kid";
    const cbC = document.createElement("input"); cbC.type = "checkbox"; cbC.checked = p.isCpu;
    cbC.onchange = () => { config.players[i].isCpu = cbC.checked; if (cbC.checked) { config.players[i].isChild = false; renderStartPlayers(); } };
    labC.appendChild(cbC); labC.append(" 🤖 PC");
    const rm = document.createElement("button"); rm.className = "rm"; rm.textContent = "✕"; rm.title = "Entfernen";
    rm.onclick = () => {
      if (config.players.length <= 1) return;
      config.players.splice(i, 1); renderStartPlayers();
    };
    rm.disabled = config.players.length <= 1;
    row.append(input, lab, labC, rm);
    c.appendChild(row);
  });
}
function addPlayer() {
  if (config.players.length >= 6) return;
  config.players.push({ name: "", isChild: false });
  renderStartPlayers();
}
function startGame() {
  // Namen säubern, leere mit Platzhalter füllen
  config.players.forEach((p, i) => { p.name = (p.name || "").trim() || `Spieler ${i + 1}`; });
  persistConfig();
  el("startOverlay").classList.remove("show");
  Audio.unlock();
  newGame();
}

//// ----- Persistenz (localStorage) -----
const SAVE_KEY = "gluecksrad_save_v1";
const CFG_KEY  = "gluecksrad_cfg_v1";
function persist() {
  if (!state) return;
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      players: state.players, cur: state.cur, deck: state.deck, puzzleIdx: state.puzzleIdx,
      revealed: [...state.revealed], guessed: [...state.guessed],
      spinValue: state.spinValue, rotation: state.rotation, kidMode,
      pending: state.pending || null, helpUsed: !!state.helpUsed,
    }));
  } catch (e) {}
}
function persistConfig() { try { localStorage.setItem(CFG_KEY, JSON.stringify(config)); } catch (e) {} }
function clearSave() { try { localStorage.removeItem(SAVE_KEY); } catch (e) {} }
function loadSave() {
  try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); return (s && Array.isArray(s.deck) && s.deck.length) ? s : null; }
  catch (e) { return null; }
}
function loadConfig() {
  try {
    const c = JSON.parse(localStorage.getItem(CFG_KEY));
    if (c && Array.isArray(c.players) && c.players.length) return c;
  } catch (e) {}
  return null;
}
function restoreState(s) {
  kidMode = s.kidMode;
  state = {
    players: s.players, cur: s.cur, deck: s.deck, puzzleIdx: s.puzzleIdx,
    revealed: new Set(s.revealed), guessed: new Set(s.guessed),
    spinValue: s.spinValue, spinning: false, rotation: s.rotation || 0,
    pending: s.pending || null, helpUsed: !!s.helpUsed,
  };
  drawWheel(state.rotation);
  render();
  if (state.pending === "round") { showRoundResult(); return; }
  setStatus(`Weiter geht's – <b>${state.players[state.cur].name}</b> ist dran!`, "info");
  scheduleCpu(1400);
}

//// ----- Einstellungs-Menü -----
function toggleMenu(force) {
  const m = el("menu");
  m.classList.toggle("open", force === undefined ? !m.classList.contains("open") : force);
}
function resetGame() {
  toggleMenu(false);
  clearTimeout(cpuTimer);
  clearSave();
  state = null;
  drawWheel(0);
  showStartScreen();
}

//// ----- Wire up -----
el("modeKids").onclick = () => { config.kidMode = true; renderModeBtns(); };
el("modeAdults").onclick = () => { config.kidMode = false; renderModeBtns(); };
el("addPlayer").onclick = addPlayer;
el("startGame").onclick = startGame;
el("spinBtn").onclick = () => { Audio.unlock(); spin(); };
el("vowelBtn").onclick = buyVowel;
el("solveBtn").onclick = openSolve;
el("tipBtn").onclick = giveTip;
el("sfxBtn").onclick = () => { const on = Audio.toggleSfx(); el("sfxBtn").classList.toggle("off", !on); el("sfxBtn").textContent = on ? "🔊 Sound" : "🔇 Sound"; };
el("musicBtn").onclick = () => { const on = Audio.toggleMusic(); el("musicBtn").classList.toggle("off", !on); el("musicBtn").textContent = on ? "🎵 Musik" : "🎵 Musik aus"; };
el("menuBtn").onclick = (e) => { e.stopPropagation(); toggleMenu(); };
el("endNowBtn").onclick = endGameNow;
el("newGameBtn").onclick = () => { toggleMenu(false); showStartScreen(); };
el("resetBtn").onclick = resetGame;
document.addEventListener("click", (e) => { if (!e.target.closest(".menuWrap")) toggleMenu(false); });
// Start-Screen per Klick auf den Hintergrund schließen, wenn schon ein Spiel läuft
el("startOverlay").addEventListener("click", (e) => { if (e.target.id === "startOverlay" && state) el("startOverlay").classList.remove("show"); });
el("solveConfirm").onclick = confirmSolve;
el("solveCancel").onclick = closeSolve;
el("solveInput").addEventListener("keydown", e => { if (e.key === "Enter") confirmSolve(); });
document.addEventListener("keydown", e => {
  if (!state) return;
  if (el("solveOverlay").classList.contains("show")) return;
  if (el("startOverlay").classList.contains("show") || el("endOverlay").classList.contains("show")) return;
  if (isCpuTurn()) return;
  const ch = e.key.toUpperCase();
  if (state.spinValue != null && /^[BCDFGHJKLMNPQRSTVWXYZ]$/.test(ch)) guessConsonant(ch);
  else if (e.key === " ") { e.preventDefault(); if (!el("spinBtn").disabled) spin(); }
});

// Init: gespeicherte Config & laufendes Spiel wiederherstellen, sonst Start-Screen
const savedCfg = loadConfig();
if (savedCfg) config = savedCfg;
const savedGame = loadSave();
if (savedGame) restoreState(savedGame);
else { drawWheel(0); showStartScreen(); }
</script>
